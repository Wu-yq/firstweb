# 根目录遗留跳转页 → 正式 canonical URL（301）
# 在 Nginx / OpenResty 等反向代理前于 GitHub Pages 使用时 include 本文件。
# 片段 URL（#about 等）由浏览器在加载首页后定位，与 meta refresh 行为一致。

location = /about.html {
  return 301 https://www.xhy-power.cn/#about;
}
location = /contact.html {
  return 301 https://www.xhy-power.cn/#contact;
}
location = /team.html {
  return 301 https://www.xhy-power.cn/#team;
}
location = /partners.html {
  return 301 https://www.xhy-power.cn/#partners;
}
location = /services.html {
  return 301 https://www.xhy-power.cn/#business;
}
location = /projects.html {
  return 301 https://www.xhy-power.cn/#business;
}
location = /articles.html {
  return 301 https://www.xhy-power.cn/articles/;
}
location = /article-renewable-major-base-outbound.html {
  return 301 https://www.xhy-power.cn/articles/new-energy-base-station/;
}
